[advisories]
# sqlx 0.8.6 records sqlx-mysql in Cargo.lock through its macro support, which
# records rsa 0.9.10 even though this backend disables sqlx default features and
# enables only Postgres at build time. Keep the ignore scoped to this advisory so
# any reachable or newly introduced audit warning still fails CI.
ignore = ["RUSTSEC-2023-0071"]
