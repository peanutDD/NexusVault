name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

# 并发保护：同一 PR 连续 push 时取消旧跑
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Backend —— Rust (axum + sqlx)
  # 依赖约束：cargo-llvm-cov ≥ 1.87、cargo-outdated ≥ 1.88 需要最新 stable。
  # 业务 MSRV 1.80 仍由 Cargo.toml 控制，CI 只跑 stable。
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/file_storage_test
      CARGO_TERM_COLOR: always
      RUSTDOCFLAGS: "-D warnings"
      RUST_TEST_THREADS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (stable + llvm-tools-preview)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      # ── 覆盖率：替代 `cargo test`，同时产出 lcov + junit ────────────────
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8

      - name: Cargo test with coverage
        run: |
          cargo llvm-cov --all-features --workspace \
            --lcov --output-path lcov.info \
            --fail-under-lines 90

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/lcov.info
          flags: backend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # ── 文档健康：私有 item 也生成，且 warning = error ─────────────────
      - name: Cargo doc
        run: cargo doc --no-deps --document-private-items --all-features

      - name: Build (release profile)
        run: cargo build --release --locked

  # ──────────────────────────────────────────────────────────────────────────
  # Security audit —— 独立 job，与 backend 并行；命中 CVE 时红线阻塞合并
  # ──────────────────────────────────────────────────────────────────────────
  security-audit:
    name: Security audit (cargo-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit@0.22

      - name: Cargo audit
        run: cargo audit --deny warnings

  # ──────────────────────────────────────────────────────────────────────────
  # Dependency freshness —— 非阻塞预警，周期性提醒升级
  # outdated 默认会因常有上游更新而返回非零，因此 continue-on-error
  # ──────────────────────────────────────────────────────────────────────────
  deps-freshness:
    name: Dependency freshness (cargo-outdated)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-outdated
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-outdated@0.19

      - name: Cargo outdated (report only)
        run: cargo outdated --workspace --root-deps-only --exit-code 0
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend —— Vite + Vitest + Playwright(build-skipped) + 类型 + bundle 预算
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install system dependencies (node-canvas)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev \
            pkg-config \
            python3

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # ── 独立类型检查：`tsc -b --noEmit` 覆盖所有 project references ─────
      - name: Type check (tsc --noEmit)
        run: npx tsc -b --noEmit

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      # ── Bundle 预算：入口/小 chunk ≤ 200KB(gzip)、重型 vendor ≤ 400KB ──
      - name: Bundle size budget
        run: node scripts/check-bundle-size.mjs
