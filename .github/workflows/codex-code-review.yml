name: Codex Code Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: codex-code-review-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  codex-review:
    if: >
      (
        github.event_name == 'pull_request'
        && github.event.pull_request.draft == false
      )
      || (
        github.event_name == 'issue_comment'
        && github.event.issue.pull_request
        && contains(github.event.comment.body, '/codex review')
      )
    runs-on: file-server
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
      CODEX_REVIEW_MODEL: gtp-5.5
      CODEX_REVIEW_COMMAND_SECRET: ${{ secrets.CODEX_REVIEW_COMMAND }}
      CODEX_REVIEW_COMMAND_VAR: ${{ vars.CODEX_REVIEW_COMMAND }}
      CODEX_REVIEW_TIMEOUT_SECONDS: 900
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Codex review model
        run: |
          set -euo pipefail
          if [[ -n "${CODEX_REVIEW_COMMAND_SECRET:-}" ]]; then
            export CODEX_REVIEW_COMMAND="${CODEX_REVIEW_COMMAND_SECRET}"
          elif [[ -n "${CODEX_REVIEW_COMMAND_VAR:-}" ]]; then
            export CODEX_REVIEW_COMMAND="${CODEX_REVIEW_COMMAND_VAR}"
          fi
          .superpowers/inline-neuromorphic/scripts/codex-review-model-cli/bin/codex-review-model \
            review-pr --repo "${GH_REPO}" --pr-number "${PR_NUMBER}"
