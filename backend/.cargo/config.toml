# ──────────────────────────────────────────────────────────────────────────────
# backend/.cargo/config.toml
# 长期构建体积 & 缓存控制
# ──────────────────────────────────────────────────────────────────────────────

[profile.dev]
# 调试信息级别：0=无, 1=仅行号(推荐), 2=完整 DWARF(默认，体积最大)
# 设为 1 可让 debug 二进制从 ~122MB 缩减到 ~60MB，仍保留行号/panic 位置
debug = 1
# macOS 上将调试信息分离到独立 .dSYM 包，避免塞进二进制
split-debuginfo = "unpacked"
# 增量编译：本地开发保持开启（加快重编译速度）
incremental = true

[profile.dev.package."*"]
# 所有第三方依赖在 dev 模式下用 opt-level=1 编译
# 效果：运行速度提升，同时减少未优化代码膨胀
opt-level = 1

# ──────────────────────────────────────────────────────────────────────────────
# CI / Docker 构建时可通过环境变量覆盖：
#   CARGO_PROFILE_DEV_INCREMENTAL=false cargo build
# 或直接使用 --profile dist（已在 Cargo.toml 定义）
# ──────────────────────────────────────────────────────────────────────────────
