server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ---------------------------------------------------------------------------
    # 补充 MIME 类型（nginx 默认 mime.types 不含 .mjs）
    # .mjs 必须是 application/javascript，否则浏览器拒绝当 ES Module / Worker 加载
    # ---------------------------------------------------------------------------
    types {
        application/javascript  js mjs;
        text/css                css;
        text/html               html htm;
        text/plain              txt;
        image/png               png;
        image/jpeg              jpg jpeg;
        image/gif               gif;
        image/svg+xml           svg svgz;
        image/webp              webp;
        image/x-icon            ico;
        font/woff               woff;
        font/woff2              woff2;
        font/ttf                ttf;
        font/otf                otf;
        application/json        json;
        application/xml         xml;
        application/pdf         pdf;
        application/wasm        wasm;
        application/octet-stream bin;
    }

    # ---------------------------------------------------------------------------
    # Gzip 压缩
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    # ---------------------------------------------------------------------------
    # HTML：永不缓存，确保 SPA 始终拿到最新入口
    # ---------------------------------------------------------------------------
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # ---------------------------------------------------------------------------
    # 静态资源（含 .mjs）：内容哈希文件名 → 强缓存 1 年
    # ---------------------------------------------------------------------------
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|otf|eot|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # 允许浏览器直接使用预压缩的 .gz / .br 文件（Vite 构建产物）
        gzip_static on;
        try_files $uri =404;
    }

    # ---------------------------------------------------------------------------
    # API 代理
    # ---------------------------------------------------------------------------
    location /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------------------------------------------------------------------
    # SPA 路由回退（必须放在最后）
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
