# .github/workflows/codex-auto-fix.yml
name: Codex Auto Fix (本地 Runner)

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  codex-fix:
    # 只在 PR 的 Gemini 评论时触发 + 只跑在你的本地 Runner
    if: >
      github.event.issue.pull_request &&
      github.event.comment.user.login == 'gemini-code-assist[bot]' &&
      startsWith(github.event.comment.body, '## Gemini Code Assist Review')  # Gemini 评论通常以此开头，可根据实际情况微调
    runs-on: codex-runner   # ← 改成你 Runner 的标签（或直接 [self-hosted]）

    steps:
      - name: Checkout PR 分支
        run: |
          gh pr checkout ${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取 Gemini Review 完整内容
        id: gemini
        run: |
          echo "REVIEW_BODY<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.comment.body }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 调用你的 codex + Superpowers 执行修复
        run: |
          # 这里替换成你真实的 Superpowers 调用命令
          codex pr-auto-fix \
            --pr-number ${{ github.event.issue.number }} \
            --gemini-review "$REVIEW_BODY" \
            --repo ${{ github.repository }} \
            --branch $(git branch --show-current) \
            --max-rounds 2   # 你可以在这里加参数控制轮次

      - name: 如果 codex 做了修复，就 push 并通知 Gemini 再审一轮
        if: success() && steps.codex.outputs.fixed == 'true'  # 让你的 codex 脚本输出这个变量
        run: |
          git add .
          git commit -m "🤖 codex auto-fix round ${{ steps.codex.outputs.round }} (based on Gemini review)" || echo "No changes to commit"
          git push origin HEAD
          
          # 自动触发 Gemini 下一轮 Review（关键！）
          gh pr comment ${{ github.event.issue.number }} --body "/gemini review"
          echo "✅ 已 push 修复并请求 Gemini 下一轮 Review"

      - name: 如果 codex 不修复，只发评论说明原因
        if: success() && steps.codex.outputs.fixed == 'false'
        run: |
          gh pr comment ${{ github.event.issue.number }} --body "🛠️ codex 分析后认为无需修复（原因：${{ steps.codex.outputs.reason }}）"